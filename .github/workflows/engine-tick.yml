# The Ticker engine tick as a GitHub Actions cron - the $0 replacement for the
# EC2 box. Public repo => unlimited free scheduled minutes on standard runners.
#
# Design notes:
# - The tick was BUILT for a jittery scheduler: deterministic day plan, idempotent
#   generation (attempted-slot guard), idempotent publisher (deterministic post
#   ids + published_at guard), 120-min backlog floor. A late or skipped run
#   self-heals on the next one; overlapping schedulers cannot double-post - which
#   is also why a parallel trial alongside the EC2 timer is safe.
# - `concurrency` serializes runs (a new run queues instead of overlapping).
# - Scheduled runs are gated on the repo VARIABLE ENGINE_CRON_ENABLED == 'true'
#   (Settings -> Secrets and variables -> Actions -> Variables). Manual runs
#   (workflow_dispatch) always work - that's the smoke test.
# - Secrets required (Settings -> Secrets and variables -> Actions -> Secrets):
#     MODEL_API_KEY, SUPABASE_SECRET_KEY, NEXT_PUBLIC_SUPABASE_URL,
#     NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   (GROQ_API_KEY / GOOGLE_GENERATIVE_AI_API_KEY deliberately absent: daily mode
#   runs primary+secondary NVIDIA lanes only; the groq guard lane is disabled and
#   the google fallback lane exists only in the old A/B batch mode. If either is
#   ever re-enabled, add the key then - the error message will name it.)
# - GitHub disables schedules after ~60 days without repo activity (it emails a
#   warning first; one click re-enables). Normal push cadence keeps it alive.

name: engine-tick

on:
  schedule:
    # SPARSE HOURLY BACKUP ONLY (2026-07-22). The primary heartbeat is now an
    # external pinger (cron-job.org) that POSTs the workflow_dispatch API every
    # 15 min - dispatched runs bypass GitHub's schedule throttle (which degraded
    # */15 to ~hourly with a ~6h overnight gap; see context/08). This native cron
    # is kept only as a once-an-hour safety net so the feed degrades to hourly
    # (not to zero) if the pinger ever dies. :08 dodges the pinger's :00/:15/:30/:45
    # so the two rarely collide into a concurrency-cancel.
    - cron: '8 * * * *'
  workflow_dispatch: {}

concurrency:
  group: engine-tick
  cancel-in-progress: false

jobs:
  tick:
    if: github.event_name == 'workflow_dispatch' || vars.ENGINE_CRON_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: engine tick (generate due slice + publish due posts)
        run: pnpm engine:tick
        env:
          ENGINE_ENABLED: 'true'
          VERIFIER_ENABLED: 'false'
          # 180s (default 120s): nemotron free-tier latency spikes were killing
          # ~23 slots/day as "model call exceeded 120000ms" - patience is free here.
          MODEL_CALL_TIMEOUT_MS: '180000'
          # 6h stale-backlog window (default 120 min). GitHub throttles the cron to
          # ~hourly with occasional 2-4h gaps (no-plan-B decision 2026-07-20): a slot
          # stuck behind a long gap should publish LATE, not be dropped. Live publish
          # timestamps make late honest; the 120-min guard predates them (frozen-feed
          # era) and is too aggressive for a jittery scheduler.
          ENGINE_MAX_BACKLOG_MIN: '360'
          # NVIDIA-only lanes (same values the box runs; model ids are not secrets)
          MODEL_PROVIDER: 'groq'
          MODEL_BASE_URL: 'https://integrate.api.nvidia.com/v1'
          MODEL_PRIMARY: 'nim:nvidia/nemotron-3-ultra-550b-a55b:3000:1500'
          MODEL_SECONDARY: 'nim:openai/gpt-oss-120b:4000:1500'
          MODEL_VERIFIER: 'nim:deepseek-ai/deepseek-v4-pro:900:1500'
          # Credentials - GitHub encrypted secrets only, never in the repo
          MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
